<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Login - Thesis Coordination System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">Thesis<span>Coord</span></div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="login.html" class="active">Supervisor Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Supervisor Login</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="facultyId">Faculty ID</label>
                    <input type="text" id="facultyId" required placeholder="Enter your faculty ID">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                
                <p style="text-align: center; margin-top: 1rem;">
                    Don't have an account? <a href="register.html">Register here</a>
                </p>
                
                <div style="text-align: center; margin-top: 2rem;">
                    <a href="../student/login.html" class="btn btn-outline">Student Login</a>
                </div>
            </form>
        </div>
    </main>

    

    <script src="js/auth.js"></script>
</body>
</html>
